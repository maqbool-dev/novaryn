name: Test, Build & Push Docker Image

# Runs on every push to Git_test_CI AND every pull request targeting Git_test_CI.
# PRs get tested + build-validated; only actual pushes to Git_test_CI publish to Docker Hub (see note below).
on:
  push:
    branches: [Git_test_CI]
  pull_request:
    branches: [Git_test_CI]

# Cancel an older run for the same branch/PR if a new commit lands before it finishes
concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: TEST — must pass before the build job is even allowed to start
  # ---------------------------------------------------------------------------
  test:
    name: Test site code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Simple test #1 — HTML lint: catches unclosed tags, bad nesting, duplicate IDs, missing alt text, etc.
      - name: Lint HTML
        run: npx --yes htmlhint "**/*.html" --exclude "node_modules/**"

      # Simple test #2 — JS syntax check: parses every .js file without executing it.
      # Catches typos/syntax errors even though there's no unit test framework on a vanilla-JS static site.
      - name: Check JS syntax
        run: |
          find . -name "*.js" -not -path "./node_modules/*" -print0 | xargs -0 -n1 node --check

  # ---------------------------------------------------------------------------
  # JOB 2: BUILD & PUSH — only runs if "test" succeeds (needs: test)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push Docker image
    needs: test # <-- the gate: this job will not start unless the test job passed
    runs-on: ubuntu-latest

    permissions:
      contents: read # least-privilege: this job only needs to read the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we're actually going to push. On pull_request runs (especially from forks),
      # GitHub does not expose repo secrets at all — attempting login there would just fail the job.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # Docker Hub Access Token, not your account password.
          # Create one: Docker Hub -> Account Settings -> Security -> New Access Token
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Auto-derives tags: maqbool404/novaryn:latest + maqbool404/novaryn:sha-abc1234
      # "latest" is only applied on real pushes, not on PR validation builds
      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: maqbool404/novaryn
          tags: |
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=sha,prefix=sha-,format=short

      # On a PR: builds the image to prove the Dockerfile is valid, but does NOT push it anywhere.
      # On a push to Git_test_CI: builds AND pushes to Docker Hub.
      - name: Build (and push on Git_test_CI only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
